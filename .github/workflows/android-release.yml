name: Android release artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to build
        required: true
        default: '1.3.2'
        type: string

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      EXPECTED_VERSION: '1.3.2'
      EXPECTED_CERT_SHA256: '8457C0879F10049FD9CC2E5BFA5B3B124A023E358BAF0EBFAF4256F53D9E0C4E'
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Verify requested version
        run: test "${{ inputs.version }}" = "$EXPECTED_VERSION"

      - name: Validate web application
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci
          npm run version:check
          npm run lint
          npm run typecheck
          npm run test
          npm run build
          npm run cap:sync

      - name: Build and verify signed release APK
        working-directory: frontend
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          signing_dir="$(mktemp -d)"
          cleanup() {
            rm -f android/keystore.properties
            rm -rf "$signing_dir"
          }
          trap cleanup EXIT
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$signing_dir/release.jks"
          chmod 600 "$signing_dir/release.jks"
          printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' "$signing_dir/release.jks" "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_ALIAS" "$ANDROID_KEY_PASSWORD" > android/keystore.properties
          chmod 600 android/keystore.properties
          cd android
          ./gradlew lint test assembleRelease --no-daemon
          cd ..
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          build_tools="$(find "$sdk_root/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          apk="android/app/build/outputs/apk/release/app-release.apk"
          "$build_tools/apksigner" verify --verbose --print-certs "$apk" > "$signing_dir/verification.txt"
          "$build_tools/aapt" dump badging "$apk" > "$signing_dir/badging.txt"
          grep -q "package: name='com.ruben.controlfinanciero' versionCode='132' versionName='1.3.2'" "$signing_dir/badging.txt"
          ! grep -q 'application-debuggable' "$signing_dir/badging.txt"
          actual_cert="$(awk -F ': ' '/Signer #1 certificate SHA-256 digest/ { print $2 }' "$signing_dir/verification.txt" | tr '[:lower:]' '[:upper:]')"
          test "$actual_cert" = "$EXPECTED_CERT_SHA256"
          artifact_dir="release-artifact"
          mkdir -p "$artifact_dir"
          artifact_apk="$artifact_dir/control-financiero-ruben-v1.3.2.apk"
          cp "$apk" "$artifact_apk"
          sha256sum "$artifact_apk" > "$artifact_dir/SHA256SUMS.txt"
          printf '%s\n' "$actual_cert" > "$artifact_dir/SIGNING_CERT_SHA256.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: control-financiero-ruben-v1.3.2-release
          if-no-files-found: error
          path: |
            frontend/release-artifact/control-financiero-ruben-v1.3.2.apk
            frontend/release-artifact/SHA256SUMS.txt
            frontend/release-artifact/SIGNING_CERT_SHA256.txt
