name: Publish AAB to Google Play

on:
  workflow_dispatch:
    inputs:
      version:
        description: Existing release tag version
        required: true
        default: '1.3.3'
        type: string
      track:
        description: Google Play track
        required: true
        default: internal
        type: choice
        options: [internal, closed, production]
      rollout_percentage:
        description: Rollout from 0.01 to 1.0 when release status is inProgress
        required: false
        default: '1.0'
        type: string
      release_status:
        description: Google Play release status
        required: true
        default: draft
        type: choice
        options: [draft, completed, inProgress, halted]
      confirm_production:
        description: Required only for production; type PUBLISH_PRODUCTION
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: play-publish-${{ inputs.track }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: google-play-${{ inputs.track }}
    env:
      EXPECTED_APPLICATION_ID: com.ruben.controlfinanciero
      EXPECTED_VERSION_CODE: '133'
      EXPECTED_CERT_SHA256: ${{ vars.PLAY_UPLOAD_CERT_SHA256 }}
      PLAY_CONSOLE_APP_CREATED: ${{ vars.PLAY_CONSOLE_APP_CREATED }}
      PLAY_APP_SIGNING_CONFIGURED: ${{ vars.PLAY_APP_SIGNING_CONFIGURED }}
      PLAY_POLICIES_COMPLETED: ${{ vars.PLAY_POLICIES_COMPLETED }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
      ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
      ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
      ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
    steps:
      - name: Check external prerequisites
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [ "$PLAY_CONSOLE_APP_CREATED" = true ] || missing+=(PLAY_CONSOLE_APP_CREATED)
          [ "$PLAY_APP_SIGNING_CONFIGURED" = true ] || missing+=(PLAY_APP_SIGNING_CONFIGURED)
          [ "$PLAY_POLICIES_COMPLETED" = true ] || missing+=(PLAY_POLICIES_COMPLETED)
          [ -n "$EXPECTED_CERT_SHA256" ] || missing+=(PLAY_UPLOAD_CERT_SHA256)
          [ -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ] || missing+=(GOOGLE_PLAY_SERVICE_ACCOUNT_JSON)
          [ -n "$ANDROID_UPLOAD_KEYSTORE_BASE64" ] || missing+=(ANDROID_UPLOAD_KEYSTORE_BASE64)
          [ -n "$ANDROID_UPLOAD_KEYSTORE_PASSWORD" ] || missing+=(ANDROID_UPLOAD_KEYSTORE_PASSWORD)
          [ -n "$ANDROID_UPLOAD_KEY_ALIAS" ] || missing+=(ANDROID_UPLOAD_KEY_ALIAS)
          [ -n "$ANDROID_UPLOAD_KEY_PASSWORD" ] || missing+=(ANDROID_UPLOAD_KEY_PASSWORD)
          if [ ${#missing[@]} -gt 0 ]; then printf 'Missing prerequisites: %s\n' "${missing[*]}"; exit 1; fi
          if [ "${{ inputs.track }}" = production ] && [ "${{ inputs.confirm_production }}" != PUBLISH_PRODUCTION ]; then
            echo 'Missing prerequisite: confirm_production'; exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Validate and build Play candidate
        working-directory: frontend
        run: |
          set -euo pipefail
          test "${{ inputs.version }}" = 1.3.3
          npm ci
          npm run version:check
          npm run lint
          npm run typecheck
          npm run test
          npm run cap:sync:play
          signing_dir="$RUNNER_TEMP/play-signing"
          mkdir -p "$signing_dir"
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$signing_dir/upload.jks"
          chmod 600 "$signing_dir/upload.jks"
          printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' "$signing_dir/upload.jks" "$ANDROID_UPLOAD_KEYSTORE_PASSWORD" "$ANDROID_UPLOAD_KEY_ALIAS" "$ANDROID_UPLOAD_KEY_PASSWORD" > android/keystore.properties
          chmod 600 android/keystore.properties
          cd android
          ./gradlew lintPlayRelease testPlayReleaseUnitTest bundlePlayRelease --no-daemon
          cd ..
          aab=android/app/build/outputs/bundle/playRelease/app-play-release.aab
          manifest="$RUNNER_TEMP/play-manifest.xml"
          curl --fail --location --silent --show-error https://github.com/google/bundletool/releases/download/1.18.3/bundletool-all-1.18.3.jar --output "$RUNNER_TEMP/bundletool.jar"
          echo 'a099cfa1543f55593bc2ed16a70a7c67fe54b1747bb7301f37fdfd6d91028e29  '"$RUNNER_TEMP/bundletool.jar" | sha256sum --check
          java -jar "$RUNNER_TEMP/bundletool.jar" validate --bundle="$aab" >/dev/null
          java -jar "$RUNNER_TEMP/bundletool.jar" dump manifest --bundle="$aab" --module=base > "$manifest"
          grep -q "package=\"$EXPECTED_APPLICATION_ID\"" "$manifest"
          grep -q "android:versionCode=\"$EXPECTED_VERSION_CODE\"" "$manifest"
          ! grep -q REQUEST_INSTALL_PACKAGES "$manifest"
          actual_cert="$(keytool -printcert -jarfile "$aab" | awk -F': ' '/SHA256:/{gsub(":", "", $2); print toupper($2); exit}')"
          expected_cert="$(printf '%s' "$EXPECTED_CERT_SHA256" | tr '[:lower:]' '[:upper:]' | tr -d ':[:space:]')"
          test "$actual_cert" = "$expected_cert"

      - name: Upload AAB with Fastlane Supply
        working-directory: frontend/android
        run: |
          set -euo pipefail
          json_key="$RUNNER_TEMP/google-play-service-account.json"
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$json_key"
          chmod 600 "$json_key"
          gem install bundler --no-document
          bundle config set path "$RUNNER_TEMP/vendor-bundle"
          bundle install --jobs 4 --retry 3
          args=(supply --aab app/build/outputs/bundle/playRelease/app-play-release.aab --package_name "$EXPECTED_APPLICATION_ID" --track "${{ inputs.track }}" --release_status "${{ inputs.release_status }}" --json_key "$json_key" --skip_upload_metadata true --skip_upload_images true --skip_upload_screenshots true --skip_upload_changelogs true)
          if [ "${{ inputs.release_status }}" = inProgress ]; then args+=(--rollout "${{ inputs.rollout_percentage }}"); fi
          bundle exec fastlane "${args[@]}"

      - name: Remove temporary secrets
        if: always()
        working-directory: frontend
        run: |
          rm -f android/keystore.properties "$RUNNER_TEMP/google-play-service-account.json"
          rm -rf "$RUNNER_TEMP/play-signing" "$RUNNER_TEMP/vendor-bundle"
